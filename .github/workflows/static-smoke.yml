name: Static Dashboard Smoke

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

on:
  pull_request:
    paths:
      - "Interactive_Dashboard/**"
      - "scripts/static-smoke.mjs"
      - "package.json"
      - ".github/workflows/static-smoke.yml"
  push:
    branches:
      - main
    paths:
      - "Interactive_Dashboard/**"
      - "scripts/static-smoke.mjs"
      - "package.json"
      - ".github/workflows/static-smoke.yml"

jobs:
  smoke:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: 24

      - name: Run static smoke check
        run: npm test
